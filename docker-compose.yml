services:
  postgres:
    image: postgres:15
    container_name: glp1_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: glp1user
      POSTGRES_PASSWORD: glp1pass
      POSTGRES_DB: glp1_eligibility
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
